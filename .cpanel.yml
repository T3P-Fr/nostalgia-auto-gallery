---
# Déploiement o2switch (cPanel Git Version Control).
# Lancé à chaque « Deploy HEAD Commit » après mise à jour du dépôt.
#
# Le dépôt est dans /home/tila8859/repositories/nostalgia-app ; l'application Node
# tourne dans /home/tila8859/nostalgia-app (App Root de « Setup Node.js App »,
# Node v22). On copie donc le code vers l'app, puis install + build + restart.
#
# Le .env (secrets) et node_modules ne sont PAS écrasés (exclus du rsync).
deployment:
  tasks:
    - export DEPLOYPATH=/home/tila8859/nostalgia-app
    # 1) Copie le code du dépôt vers le dossier de l'app (préserve .env et node_modules).
    - /usr/bin/rsync -a --delete --exclude node_modules --exclude .env --exclude .git ./ $DEPLOYPATH/
    # 2) Installe UNIQUEMENT les deps runtime (express, nodemailer, dotenv). Le front
    #    (dist/) est déjà buildé en local et versionné → pas de build lourd ici.
    - source /home/tila8859/nodevenv/nostalgia-app/22/bin/activate && cd $DEPLOYPATH && npm install --omit=dev
    # 3) Redémarre l'application (Passenger).
    - mkdir -p $DEPLOYPATH/tmp && touch $DEPLOYPATH/tmp/restart.txt
